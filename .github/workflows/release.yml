name: release

# Dispara ao empurrar uma tag tipo v1.2.3 (ou manualmente, informando a tag).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da release (ex: v0.1.0)'
        required: true

permissions:
  contents: write   # necessário pra criar a release e anexar os .zip

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CarForge.sln

      - name: Build (Release)
        run: dotnet build CarForge.sln -c Release --no-restore

      - name: Test (motor)
        run: dotnet test tests/CarForge.Core.Tests/CarForge.Core.Tests.csproj -c Release --no-build

      - name: Publish GUI (standalone, self-contained)
        run: dotnet publish src/CarForge.App/CarForge.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/gui

      - name: Publish CLI (standalone, self-contained)
        run: dotnet publish src/CarForge.Cli/CarForge.Cli.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/cli

      - name: Empacotar (.zip)
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.tag || github.ref_name }}"
          Compress-Archive -Path publish/gui/* -DestinationPath "CarForge-$ver-win-x64.zip" -Force
          Compress-Archive -Path publish/cli/* -DestinationPath "CarForge-CLI-$ver-win-x64.zip" -Force
          Get-ChildItem *.zip | Select-Object Name, @{N='MB';E={[math]::Round($_.Length/1MB,1)}}

      - name: Criar release e anexar os .zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: CarForge ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            CarForge-*-win-x64.zip
