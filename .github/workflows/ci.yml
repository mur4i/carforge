name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CarForge.sln

      - name: Build (Release)
        run: dotnet build CarForge.sln -c Release --no-restore

      - name: Test (motor)
        run: dotnet test tests/CarForge.Core.Tests/CarForge.Core.Tests.csproj -c Release --no-build --verbosity normal
